{% extends "base.html" %}
{% block content %}
<h1>{{ "도서 수정" if book else "도서 등록" }}</h1>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<div class="card">
  <form method="post" action="{{ '/books/' ~ book.id ~ '/edit' if book else '/books/new' }}">
    <div class="form-group">
      <label>제목</label>
      <input type="text" name="title" value="{{ book.title if book else '' }}" required>
    </div>
    <div class="form-group">
      <label>저자</label>
      <input type="text" name="author" value="{{ book.author if book else '' }}" required>
    </div>
    <div class="form-group">
      <label>출판사</label>
      <input type="text" name="publisher" value="{{ book.publisher if book else '' }}" required>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" type="submit">저장</button>
      <a class="btn btn-secondary" href="/books/">취소</a>
    </div>
  </form>
</div>
{% endblock %}
